<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Architect OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; transition: all 0.5s ease; }
        :root { --pid-rgb: 74, 222, 128; }
        .theme-Ubuntu { background-color: #e9e9e9; --accent: #e95420; }
        .theme-MacOS { background-color: #f0f0f0; --accent: #007aff; }
        .theme-Windows { background-color: #d1d1d1; --accent: #0078d4; }
        .theme-RaspberryPi { background-color: #2b001a; --accent: #c51a4a; color: white; }
        .bg-accent { background-color: var(--accent); }
        .text-accent { color: var(--accent); }
        .border-accent { border-color: var(--accent); }
    </style>
</head>
<body id="app-body" class="theme-Ubuntu min-h-screen overflow-hidden">

    <!-- Funksjonell Status Bar / OS Parser -->
    <div id="top-bar" class="h-7 flex items-center justify-between px-3 text-[10px] bg-black text-white transition-colors duration-500">
        <div class="flex gap-4 font-bold">
            <span>Activities</span>
            <span id="os-name">Claude_Ubuntu_OS</span>
        </div>
        <div class="flex gap-4 items-center">
            <span id="cpu-load" class="flex items-center gap-1"><i data-lucide="cpu" class="w-3 h-3"></i> 0%</span>
            <span id="net-status" class="flex items-center gap-1"><i data-lucide="wifi" class="w-3 h-3"></i> Online</span>
            <span id="os-env" class="uppercase">Ubuntu PID Mode</span>
        </div>
    </div>

    <div class="flex h-[calc(100vh-28px)]">
        <div id="dock" class="w-14 flex flex-col items-center py-4 gap-6 bg-black">
            <i id="icon-cpu" data-lucide="cpu" class="text-white w-5 h-5"></i>
            <i id="icon-term" data-lucide="terminal" class="text-white w-5 h-5"></i>
            <i id="icon-pkg" data-lucide="package" class="text-white w-5 h-5"></i>
            <i id="icon-set" data-lucide="settings" class="text-white w-5 h-5"></i>
        </div>

        <div class="flex-1 p-6 grid grid-cols-1 md:grid-cols-2 gap-6 overflow-y-auto">
            <div class="bg-black border-2 border-accent rounded-lg p-4 h-[450px] flex flex-col shadow-2xl">
                <h3 class="text-[11px] text-accent font-bold mb-3 uppercase flex items-center gap-2">
                    <i data-lucide="bot" class="w-4 h-4"></i> Autonomous_PID_Parser
                </h3>
                <div id="terminal-logs" class="flex-1 overflow-y-auto space-y-2 font-mono text-[10px] text-gray-300">
                    <div>➜ Claude_Agent: PID-loop active. System kernel parsed.</div>
                </div>
                <div id="status-pulse" class="mt-2 text-center text-[8px] text-accent uppercase animate-pulse">Running in Ubuntu PID Mode</div>
            </div>

            <div class="bg-white rounded-xl shadow-xl border p-5 text-gray-800">
                <h1 class="text-md font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="monitor" class="w-4 h-4"></i> OS System PID Settings
                </h1>
                <div id="converter-buttons" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const themes = { Ubuntu: "theme-Ubuntu", MacOS: "theme-MacOS", Windows: "theme-Windows", RaspberryPi: "theme-RaspberryPi" };
        const osColors = { Ubuntu: "#e95420", MacOS: "#007aff", Windows: "#0078d4", RaspberryPi: "#c51a4a" };
        const osIcons = {
            Ubuntu: ["cpu", "terminal", "package", "settings"],
            MacOS: ["command", "layout-template", "folder", "sliders"],
            Windows: ["grid", "code-2", "layout-grid", "wrench"],
            RaspberryPi: ["radio", "git-branch", "box", "zap"]
        };
        const osList = ['MacOS', 'Ubuntu', 'Windows', 'RaspberryPi'];
        
        const container = document.getElementById('converter-buttons');
        const logs = document.getElementById('terminal-logs');
        const body = document.getElementById('app-body');
        const cpuLoad = document.getElementById('cpu-load');
        const osName = document.getElementById('os-name');
        const osEnv = document.getElementById('os-env');
        const pulse = document.getElementById('status-pulse');

        // Dynamisk system-parser for statusbar
        setInterval(() => {
            const load = Math.floor(Math.random() * 30) + 5;
            cpuLoad.innerHTML = `<i data-lucide="cpu" class="w-3 h-3"></i> ${load}%`;
            lucide.createIcons();
        }, 2000);

        osList.forEach(os => {
            const btn = document.createElement('div');
            btn.className = "flex justify-between items-center p-3 border rounded cursor-pointer hover:bg-gray-100 transition";
            btn.innerHTML = `<span class="text-[12px] font-semibold">${os} PID Interface</span><button class="bg-accent text-white px-3 py-1 rounded text-[10px]">Sync</button>`;
            btn.onclick = () => applyTheme(os);
            container.appendChild(btn);
        });

        function applyTheme(os) {
            body.className = themes[os] + " min-h-screen overflow-hidden";
            document.documentElement.style.setProperty('--accent', osColors[os]);
            
            const icons = osIcons[os];
            document.getElementById('icon-cpu').setAttribute('data-lucide', icons[0]);
            document.getElementById('icon-term').setAttribute('data-lucide', icons[1]);
            document.getElementById('icon-pkg').setAttribute('data-lucide', icons[2]);
            document.getElementById('icon-set').setAttribute('data-lucide', icons[3]);

            osName.innerText = "Claude_" + os + "_OS";
            osEnv.innerText = os + " PID Mode";
            pulse.innerText = "Active PID: " + os;
            
            const div = document.createElement('div');
            div.innerHTML = `➜ Claude_Agent: Parser-log -> [OS: ${os}] -> PID Vector Sync: <span class="text-accent">${osColors[os]}</span>`;
            logs.prepend(div);
            
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
</body>
</html>
