<html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Mobile OS Wrapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .phone-wrapper {
            width: 380px;
            height: 760px;
            border-radius: 50px;
            overflow: hidden;
            background: #2c001e;
            position: relative;
            box-shadow: 0 0 0 8px #1a1a1a, 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 4px solid #333;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 25px;
            background: #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 50;
        }

        body {
            background-color: #0e0e0e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Ubuntu', sans-serif;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper flex flex-col pt-8">
        <div class="notch"></div>
        
        <div class="h-8 w-full flex justify-between items-center px-8 text-white text-xs font-bold z-40">
            <span>16:09</span>
            <span>5G / 100%</span>
        </div>

        <header class="glass m-5 p-6 rounded-3xl text-white mt-4">
            <h1 class="text-2xl font-bold tracking-tight">Ubuntu Mobile</h1>
            <p class="text-sm opacity-70">Terminal active</p>
        </header>

        <main class="flex-grow p-4 flex flex-col gap-4">
            <div class="glass flex-grow rounded-3xl p-6 flex flex-col gap-4 text-white">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-orange-600 flex items-center justify-center font-bold text-xl shadow-lg">U</div>
                    <div>
                        <h2 class="font-semibold">Terminal</h2>
                        <p class="text-xs opacity-60">user@ubuntu:~$</p>
                    </div>
                </div>
                <div id="terminal-output" class="bg-black/50 rounded-2xl p-4 font-mono text-sm overflow-hidden h-40 border border-white/10 text-green-400">
                    <div>Welcome to Ubuntu Mobile</div>
                    <div id="input-line">user@ubuntu:~$ <span id="cursor-text"></span><span class="animate-pulse">_</span></div>
                </div>
            </div>

            <!-- Keyboard GUI -->
            <div class="glass rounded-3xl p-3 grid grid-cols-10 gap-1 text-white text-xs">
                <!-- Simple layout for demonstration -->
                <script>
                    const keys = "qwertyuiopasdfghjklzxcvbnm".split('');
                    const cursorText = document.getElementById('cursor-text');
                    
                    keys.forEach(key => {
                        document.write(`<button onclick="typeKey('${key}')" class="bg-white/10 hover:bg-white/20 p-2 rounded-lg">${key}</button>`);
                    });
                    document.write(`<button onclick="typeKey(' ')" class="col-span-10 bg-white/10 hover:bg-white/20 p-2 rounded-lg">SPACE</button>`);

                    function typeKey(key) {
                        cursorText.innerText += key;
                    }
                </script>
            </div>
        </main>
    </div>

    <script>
        // Allow physical keyboard typing as well
        document.addEventListener('keydown', (e) => {
            if (e.key.length === 1) {
                document.getElementById('cursor-text').innerText += e.key;
            } else if (e.key === 'Backspace') {
                const current = document.getElementById('cursor-text').innerText;
                document.getElementById('cursor-text').innerText = current.slice(0, -1);
            }
        });
    </script>
</body>
</html>
