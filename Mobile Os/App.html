<html>
<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubuntu Mobile Terminal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); }
        .phone-wrapper { width: 380px; height: 760px; border-radius: 50px; overflow: hidden; background: #1a1a1a; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.5); border: 4px solid #333; }
        .notch { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 25px; background: #000; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 50; }
        body { background-color: #050505; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: sans-serif; }
        .key-btn { background: #d2b48c; color: #4a3728; font-weight: 600; padding: 10px 0; border-radius: 6px; transition: all 0.1s; box-shadow: 0 2px 0 #a08a6b; font-size: 0.8rem; }
        .key-btn:active { transform: translateY(2px); box-shadow: none; background: #c5a77d; }
        .cmd-btn { background: #b09a7a; color: #332; }
    </style>
</head>
<body>

<div class="phone-wrapper flex flex-col pt-8">
    <div class="notch"></div>
    <div class="h-8 w-full flex justify-between items-center px-8 text-white text-xs font-bold z-40"><span>16:09</span><span>5G / 100%</span></div>

    <main class="flex-grow p-4 flex flex-col gap-4">
        <div class="glass flex-grow rounded-3xl p-6 flex flex-col gap-2 text-white">
            <h2 class="font-semibold text-lg">Terminal Shell</h2>
            <div id="output" class="bg-black/40 rounded-2xl p-4 font-mono text-xs h-32 border border-white/5 overflow-y-auto text-green-400">
                <div id="history"></div>
                <div>user@ubuntu:~$ <span id="text-display"></span><span class="animate-pulse">|</span></div>
            </div>
        </div>

        <div class="glass rounded-3xl p-3 flex flex-col gap-1.5">
            <div id="keys-container" class="grid grid-cols-10 gap-1"></div>
        </div>
    </main>
</div>

<script>
    let currentInput = "";
    const display = document.getElementById('text-display');
    const history = document.getElementById('history');
    
    // Simulerer 150+ kommandoer (eksempel)
    const commands = ["ls", "cd", "pwd", "cat", "echo", "grep", "top", "htop", "sudo", "apt", "mkdir", "rm", "mv", "cp", "ssh", "ping", "netstat", "ip", "clear", "man"];
    
    const layout = [
        "ESC", "1", "2", "3", "4", "5", "6", "7", "8", "9",
        "0", "Q", "W", "E", "R", "T", "Y", "U", "I", "O",
        "P", "A", "S", "D", "F", "G", "H", "J", "K", "L",
        "Z", "X", "C", "V", "B", "N", "M", "HOME", "DEL", "ENTER"
    ];

    function renderKeyboard() {
        const container = document.getElementById('keys-container');
        container.innerHTML = '';
        layout.forEach(k => {
            const span = ["SPACE", "ENTER", "HOME"].includes(k) ? "col-span-2" : "col-span-1";
            container.innerHTML += `<button class="key-btn ${span} ${k.length > 1 ? 'cmd-btn' : ''}" onclick="handleKey('${k}')">${k}</button>`;
        });
    }

    function handleKey(k) {
        if (k === "DEL") { currentInput = currentInput.slice(0, -1); }
        else if (k === "ENTER") { processCommand(); }
        else if (k === "ESC") { currentInput = ""; }
        else if (k === "HOME") { /* scroll to top logic */ }
        else if (k === "SPACE") { currentInput += " "; }
        else { currentInput += k.toLowerCase(); }
        display.innerText = currentInput;
    }

    function processCommand() {
        history.innerHTML += `<div>user@ubuntu:~$ ${currentInput}</div>`;
        if (currentInput.trim() === "clear") history.innerHTML = "";
        else history.innerHTML += `<div class="text-gray-400">Command '${currentInput}' executed (Simulation of 150+ commands active)</div>`;
        currentInput = "";
        display.innerText = "";
    }

    renderKeyboard();
</script>
</body>
</html>
